<!-- Encabezado: logotipo, navegación y menú móvil -->
<header class="w-full border-b-2 border-brand-dark/30 bg-brand-accent-soft">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-5">
    <!-- Logotipo -->
    <a href="/" class="flex items-center gap-2 text-brand-ink">
      <span class="grid h-8 w-8 place-items-center rounded-full bg-brand-dark text-brand-cream">
        <!-- Ícono hoja -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
          <path d="M11 20A7 7 0 0 1 4 13V6h7a7 7 0 0 1 7 7 7 7 0 0 1-7 7Z"/>
          <path d="M11 13 4 6"/>
        </svg>
      </span>
      <span class="text-lg font-semibold tracking-tight">
        Reco<span class="text-brand-dark">lecta</span>
      </span>
    </a>

    <!-- Navegación desktop -->
    <nav class="hidden items-center gap-8 md:flex">
      @for (link of navLinks; track link.fragment) {
        <a [href]="'#' + link.fragment"
           class="text-sm font-medium text-brand-ink/80 transition hover:text-brand-dark">
          {{ link.label }}
        </a>
      }
    </nav>

    <!-- Menú móvil -->
    <button type="button"
            (click)="toggleMenu()"
            class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-brand-dark/30
                   text-brand-ink md:hidden"
            aria-label="Abrir menú">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
        <path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/>
      </svg>
    </button>
  </div>

  <!-- Menú mobile desplegable -->
  @if (menuOpen()) {
    <div class="border-t border-brand-dark/15 md:hidden">
      <nav class="mx-auto flex max-w-6xl flex-col gap-2 px-6 py-4">
        @for (link of navLinks; track link.fragment) {
          <a [href]="'#' + link.fragment"
             (click)="toggleMenu()"
             class="rounded-lg px-3 py-2 text-sm font-medium text-brand-ink/80 hover:bg-brand-dark/10">
            {{ link.label }}
          </a>
        }
      </nav>
    </div>
  }
</header>
