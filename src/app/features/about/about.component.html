<section [@aboutEnter] class="bg-brand-cream py-14 md:py-20">
  <div
    class="mx-auto grid max-w-6xl gap-10 px-6 md:grid-cols-[minmax(0,1.05fr)_minmax(0,1fr)] md:gap-12 md:items-start">
    <blockquote
    class="about-enter-item relative mx-auto flex w-full max-w-lg min-h-[280px] flex-col justify-between rounded-3xl bg-brand-panel px-6 py-9 shadow-lg sm:px-7 md:min-h-[320px]">      <span aria-hidden="true" class="font-serif text-5xl leading-none text-white/40">“</span>
      <div class="flex flex-1 flex-col">
        <p class="pt-2 text-lg italic leading-relaxed text-white md:text-xl">
          {{ content.quote }}
        </p>
        <span aria-hidden="true" class="mt-1 self-end font-serif text-5xl leading-none text-white/40">”</span>
      </div>
      <footer class="pt-6 text-sm text-brand-cream/75">
        {{ content.quoteAttribution }}
      </footer>
    </blockquote>

    <div class="flex flex-col gap-5 pt-1">
      <p
        class="about-enter-item text-xs font-semibold uppercase tracking-[0.2em] text-brand-dark">
        — {{ content.kicker }}
      </p>

      <h1 class="about-enter-item text-4xl font-extrabold tracking-tight text-brand-ink md:text-5xl">
        {{ content.title }}
      </h1>

      <span
        class="about-enter-item inline-flex w-fit items-center rounded-full border-2 border-brand-accent bg-brand-accent-muted/40 px-4 py-2 text-sm font-medium text-brand-darker">
        {{ content.badge }}
      </span>

      <p class="about-enter-item max-w-prose text-base leading-relaxed text-brand-ink-soft md:text-[1.05rem]">
        {{ content.description }}
      </p>

      <ul class="about-enter-item mt-2 flex list-none flex-col gap-3 pl-0">
        @for (item of content.bullets; track item) {
          <li class="flex items-start gap-3 text-brand-ink-soft">
            <span
              class="mt-1.5 h-2.5 w-2.5 shrink-0 rounded-full bg-brand-accent"
              aria-hidden="true"></span>
            <span>{{ item }}</span>
          </li>
        }
      </ul>
    </div>
  </div>
</section>
